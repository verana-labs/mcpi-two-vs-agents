chartSource: oci://registry-1.docker.io/veranalabs/vs-agent-chart
chartVersion: v1.7.3

chartNamespace: vna-__NETWORK__-1

global:
  domain: __NETWORK__.verana.network

name: mcpi-agent-b
replicas: 1

adminPort: 3000
didcommPort: 3001
eventsBaseUrl: "https://mcpi-agent-b.__NETWORK__.verana.network"
publicDidMethod: "webvh"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

ingress:
  host: "mcpi-agent-b.__NETWORK__.verana.network"
  tlsSecret: "public.mcpi-agent-b.__NETWORK__.verana.network-cert"
  public:
    enableCors: true
  private:
    enableCors: true
    whitelistSourceRange: ""
    tlsSecret: ""
    host: ""

extraEnv:
  - name: NODE_OPTIONS
    value: "--max-old-space-size=384"
  - name: ENABLE_PUBLIC_API_SWAGGER
    value: "true"
  - name: AGENT_LOG_LEVEL
    value: "3"
  - name: USE_CORS
    value: "true"

storage:
  size: 1Gi
  storageClassName: csi-cinder-high-speed
