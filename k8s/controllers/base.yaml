apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcpi-controller-a-data
  namespace: vna-__NETWORK__-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: csi-cinder-high-speed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcpi-controller-b-data
  namespace: vna-__NETWORK__-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: csi-cinder-high-speed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpi-controller-a
  namespace: vna-__NETWORK__-1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcpi-controller-a
  template:
    metadata:
      labels:
        app: mcpi-controller-a
    spec:
      containers:
        - name: controller
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              cp -R /config/. /work
              cd /work
              npm install --omit=dev
              node index.js
          env:
            - name: PORT
              value: "4101"
            - name: AGENT_NAME
              value: "MCPI Query Agent A"
            - name: VS_AGENT_ADMIN_URL
              value: "http://mcpi-agent-a:3000"
            - name: PEER_MCPI_URL
              value: "http://mcpi-controller-b:4102"
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mcpi-controller-runtime
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: mcpi-controller-runtime
                  key: OLLAMA_MODEL
            - name: MCPI_ENV
              valueFrom:
                configMapKeyRef:
                  name: mcpi-controller-runtime
                  key: MCPI_ENV
            - name: MCPI_AUDIT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: mcpi-controller-runtime
                  key: MCPI_AUDIT_ENABLED
            - name: MCPI_IDENTITY_PATH
              value: "/data/mcpi-identity"
            - name: PUBLIC_BASE_URL
              value: "https://mcpi-controller-a.__NETWORK__.verana.network"
          ports:
            - containerPort: 4101
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 4101
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4101
            initialDelaySeconds: 90
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: controller-app
              mountPath: /config
              readOnly: true
            - name: controller-work
              mountPath: /work
            - name: controller-data
              mountPath: /data
      volumes:
        - name: controller-app
          configMap:
            name: mcpi-controller-app
        - name: controller-work
          emptyDir: {}
        - name: controller-data
          persistentVolumeClaim:
            claimName: mcpi-controller-a-data
---
