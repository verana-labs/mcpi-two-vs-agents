---
apiVersion: v1
kind: Service
metadata:
  name: mcpi-controller-a
  namespace: vna-__NETWORK__-1
spec:
  type: ClusterIP
  selector:
    app: mcpi-controller-a
  ports:
    - name: http
      port: 4101
      targetPort: 4101
---
apiVersion: v1
kind: Service
metadata:
  name: mcpi-controller-b
  namespace: vna-__NETWORK__-1
spec:
  type: ClusterIP
  selector:
    app: mcpi-controller-b
  ports:
    - name: http
      port: 4102
      targetPort: 4102
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-mcpi-controller-a
  namespace: vna-__NETWORK__-1
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mcpi-controller-a.__NETWORK__.verana.network
      secretName: public.mcpi-controller-a.__NETWORK__.verana.network-cert
  rules:
    - host: mcpi-controller-a.__NETWORK__.verana.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcpi-controller-a
                port:
                  number: 4101
---
